# Production stack — project name: livotale-prod
#
# First-time setup:
#   cp .env.production.example .env.production   # fill secrets
#   docker compose --env-file .env.production --profile init run --rm db-init
#   docker compose --env-file .env.production --profile init run --rm seed-init
#   docker compose --env-file .env.production up -d --build
#
# Reset database:
#   docker compose --env-file .env.production down -v
#   docker compose --env-file .env.production --profile init run --rm db-init
#   docker compose --env-file .env.production --profile init run --rm seed-init
#   docker compose --env-file .env.production up -d --build

name: livotale-prod

x-api-environment: &api-environment
  APP_ENV: production
  DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-livotale_user}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-livotale}
  REDIS_URL: redis://redis:6379
  JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
  JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
  JWT_ISSUER: ${JWT_ISSUER:-livotale-api}
  CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS is required}
  S3_BUCKET: ${S3_BUCKET:?S3_BUCKET is required}
  S3_REGION: ${S3_REGION:-ap-south-1}
  S3_KEY_PREFIX: ${S3_KEY_PREFIX:-livotale}
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:?AWS_ACCESS_KEY_ID is required}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:?AWS_SECRET_ACCESS_KEY is required}
  INTEGRATIONS_ENCRYPTION_KEY: ${INTEGRATIONS_ENCRYPTION_KEY:-}
  BANK_DETAILS_ENCRYPTION_KEY: ${BANK_DETAILS_ENCRYPTION_KEY:-}
  INTERNAL_NOTIFICATIONS_KEY: ${INTERNAL_NOTIFICATIONS_KEY:?INTERNAL_NOTIFICATIONS_KEY is required}
  NOTIFICATION_TEST_PHONE_ALLOWLIST: ${NOTIFICATION_TEST_PHONE_ALLOWLIST:-}
  RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
  API_AUDIT_LOGGING: ${API_AUDIT_LOGGING:-true}
  SEED_PACKAGES_ON_STARTUP: "false"

services:
  postgres:
    image: postgres:16-alpine
    networks:
      - livotale
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-livotale_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-livotale}
    volumes:
      - livotale_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-livotale_user} -d ${POSTGRES_DB:-livotale}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    networks:
      - livotale
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  db-init:
    profiles: ["init"]
    image: node:20-alpine
    networks:
      - livotale
    working_dir: /workspace/apps/api
    volumes:
      - .:/workspace
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-livotale_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-livotale}
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npm install pg dotenv && node scripts/run-migrations.js"
    restart: "no"

  seed-init:
    profiles: ["init"]
    build:
      context: .
      dockerfile: docker/api/Dockerfile.prod
    networks:
      - livotale
    working_dir: /app
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-livotale_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-livotale}
      SEED_PACKAGES_ON_STARTUP: "false"
    volumes:
      - ./packages:/packages:ro
    depends_on:
      db-init:
        condition: service_completed_successfully
    command: python scripts/seed_project_bootstrap.py
    restart: "no"

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile.prod
    networks:
      - livotale
    expose:
      - "4000"
    env_file:
      - path: .env.production
        required: false
    environment:
      <<: *api-environment
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: docker/api/Dockerfile.prod
    networks:
      - livotale
    command: arq app.workers.settings.WorkerSettings
    env_file:
      - path: .env.production
        required: false
    environment:
      <<: *api-environment
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    restart: unless-stopped

  db-backup:
    build:
      context: .
      dockerfile: docker/db-backup/Dockerfile
    networks:
      - livotale
    env_file:
      - path: .env.production
        required: false
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-livotale_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-livotale}
      S3_BUCKET: ${S3_BUCKET:?S3_BUCKET is required}
      S3_REGION: ${S3_REGION:-ap-south-1}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_BACKUP_PREFIX: ${S3_BACKUP_PREFIX:-backub}
      DB_BACKUP_CRON: ${DB_BACKUP_CRON:-0 2 * * *}
      RUN_BACKUP_ON_STARTUP: ${RUN_BACKUP_ON_STARTUP:-false}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:?AWS_ACCESS_KEY_ID is required}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:?AWS_SECRET_ACCESS_KEY is required}
      TZ: ${TZ:-UTC}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  ui:
    build:
      context: .
      dockerfile: docker/ui/Dockerfile.prod
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
        VITE_APP_ENV: production
    networks:
      - livotale
    expose:
      - "80"
    restart: unless-stopped

  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile.prod
    networks:
      - livotale
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      - api
      - ui
    restart: unless-stopped

networks:
  livotale:
    name: livotale-prod
    driver: bridge

volumes:
  livotale_pg_data:
    name: livotale-prod_pg_data
