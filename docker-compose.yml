services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: livotale_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: livotale
    ports:
      - "5433:5432"
    volumes:
      - livotale_pg_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U livotale_user -d livotale"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  localstack:
    image: localstack/localstack:3
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3
      DEFAULT_REGION: ap-south-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    volumes:
      - livotale_localstack:/var/lib/localstack

  api:
    build:
      context: ./apps/api
      dockerfile: ../../docker/api/Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 4000 --reload
    ports:
      - "4001:4000"
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql+asyncpg://livotale_user:password@postgres:5432/livotale
      REDIS_URL: redis://redis:6379
      JWT_SECRET: livotale-development-jwt-secret-change-me
      CORS_ORIGINS: http://localhost:5174,http://localhost:5173
      S3_ENDPOINT: http://localstack:4566
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      S3_BUCKET: livotale-files
      S3_REGION: ap-south-1
      INTEGRATIONS_MODE: dummy
      OTP_MODE: demo
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app

  ui:
    build:
      context: ./apps/ui
      dockerfile: ../../docker/ui/Dockerfile
    ports:
      - "5174:5174"
    environment:
      VITE_API_BASE_URL: http://localhost:4001/api/v1
      VITE_EXTERNAL_SERVICES_MODE: dummy
    depends_on:
      - api
    volumes:
      - ./apps/ui:/app
      - /app/node_modules

  worker:
    build:
      context: ./apps/api
      dockerfile: ../../docker/api/Dockerfile
    command: arq app.workers.settings.WorkerSettings
    environment:
      DATABASE_URL: postgresql+asyncpg://livotale_user:password@postgres:5432/livotale
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
    profiles: ["full"]

volumes:
  livotale_pg_data:
  livotale_localstack:
