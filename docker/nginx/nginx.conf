# Consolidated dev gateway: UI + API on one port (host 3008 → container 80).
# Upstreams use Docker Compose service names on the shared livotale network.

upstream livotale_ui {
    server ui:5174;
}

upstream livotale_api {
    server api:4000;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 32m;

    # FastAPI REST
    location /api/ {
        proxy_pass http://livotale_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # FastAPI WebSockets (/ws/v1/...)
    location /ws/ {
        proxy_pass http://livotale_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_buffering off;
    }

    # OpenAPI / docs (dev convenience)
    location /docs {
        proxy_pass http://livotale_api;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://livotale_api;
        proxy_set_header Host $host;
    }

    location /redoc {
        proxy_pass http://livotale_api;
        proxy_set_header Host $host;
    }

    # Vite dev server + HMR
    location / {
        proxy_pass http://livotale_ui;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
